---
# yamllint disable rule:line-length
###############################################################################
# Feature Flags
###############################################################################

# 1. Is this role applied to a container?
#
# Decision: manual user setting - There is currently no good way to
#     deterministically and consistently detect if a remote host is a
#     container outside of common cases.
#
# Special Case:
#   * deb_flg_container=true forces star_rupture_flg_container=true.
#
# Default: False.
star_rupture_flg_container: false

# 2. Force Static IP for client-download.steampowered.com?
#
# client-download.steampowered.com is used for internet connectivity checks and
# to download data. CDN DNS updates may break this for up to 72 hours. steamcmd
# will fail with 'Please confirm your network connection and try again.'.
#
# Enabling resolves media.steampowered.com and statically sets /etc/hosts which
# fix this specific issue. Requires star_rupture_flg_container=false.
#
# This should ONLY be used as a one-off and not set by default as changing IP's
# will result in steamcmd breaking again in the future.
#
# Reference:
# * https://r-pufky.github.io/docs/game/steam/troubleshooting
star_rupture_flg_cdn: false

# 3. Force Star Rupture server updates if already installed?
#
# Disables all updates during role application as well as service pre-start
# update checks.
#
# Default: False.
star_rupture_flg_update: false

# 4. Set configuration files?
#
# Sets star_rupture_srv_ds. Admin/User passwords are always applied.
#
# Default: False.
star_rupture_flg_config: false

# 5. Enable scheduled server backup?
#
# See star_rupture_cfg_backup_*.
#
# Default: False
star_rupture_flg_backup: false

###############################################################################
# Service
###############################################################################

# Github access token (winetricks).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
star_rupture_srv_token: ''

# Additional steamcmd options to use during app_update.
#
# Use 'validate' to checksum installed files for corruption.
#
# Default: [].
star_rupture_srv_update_opts: []

# Server launch options.
#
# Command line options passed to dedicated server.
#
# Security:
#   CVE:
#   * https://wiki.starrupture-utilities.com/en/dedicated-server/Vulnerability-Announcement
#   Decision: Disable remote control web interface.
#   Mitigation:
#   * Disable 7777/tcp access from Internet.
#   * Set RCWebControlDisable, RCWebInterfaceDisable.
#
# Default: [].
#   - 'MULTIHOME=0.0.0.0'
#   - 'Port=7777'
#   - 'ServerName=StarRupture'
#
# Reference:
# * https://wiki.starrupture-utilities.com/en/dedicated-server/configuration
star_rupture_srv_launch_opts:
  - 'Log'
  - 'RCWebControlDisable'
  - 'RCWebInterfaceDisable'
  - 'MULTIHOME=0.0.0.0'
  - 'Port=7777'
  - 'ServerName=StarRupture'
  - 'MaxPlayers=4'

# Star Rupture server configuration to set.
#
# Ansible controller path to source DSSettings.txt (treated as a jinja2
# templates allowing for ansible variable use). If used the latest save for the
# session is automatically loaded during service start.
#
# Sets /home/steam/star_rupture/DSSettings.ini.
#
# star_rupture_flg_config=true:
# ⋮star_rupture_srv_ds='' - Remove existing file.
# ⋮star_rupture_srv_ds='{DIR}' - Replace existing file with sourced template
# ⋮    file.
# star_rupture_flg_config=false:
# ⋮star_rupture_srv_ds=* - Use autogenerated config (see templates/default).
#
# star_rupture_srv_ds: 'host_vars/sr.example.com/DSSettings.txt'
#
# Default: '' (use auto-generated defaults on startup).
#
# Reference:
# * https://wiki.starrupture-utilities.com/en/dedicated-server/configuration#dssettingstxt
star_rupture_srv_ds: ''

# Admin password.
#
# Used for 'Manage Server' in game. This is not used to connect to the server
# to play.
#
# Password is sent to developer API and signed with RSA-4096 key. Considered
# any password used as compromised. Setting to empty string disables.
#
# Default: 'StarRuptureAdmin' (Use pre-generated keys).
#
# Reference:
# * https://starrupture-utilities.com/passwords
star_rupture_srv_admin: 'StarRuptureAdmin'

# User password.
#
# Used for 'Join Game ➔ Dedicated Server' in game. This is no distinction
# between players in the play session.
#
# Password is sent to developer API and signed with RSA-4096 key. Considered
# any password used as compromised. Setting to empty string disables.
#
# Default: 'StarRupture' (Use pre-generated keys).
#
# Reference:
# * https://starrupture-utilities.com/passwords
star_rupture_srv_user: 'StarRupture'

###############################################################################
# Config
###############################################################################

# Root backup location. Default: '/srv/backup/star_rupture'.
star_rupture_cfg_backup_d: '/srv/backup/star_rupture'

# Backup schedule (systemd TIME format).
#
# Default: '1d' (daily).
#
# Reference:
# * https://www.freedesktop.org/software/systemd/man/latest/systemd.time.html
star_rupture_cfg_backup_schedule: '1d'
