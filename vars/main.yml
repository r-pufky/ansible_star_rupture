---
# yamllint disable rule:line-length
###############################################################################
# Star Rupture Options
###############################################################################
#
# Updates:
# * Version is determined by CL file in root install directory.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://starruptureplanner.com/guides/dedicated-server
# * https://wiki.starrupture-utilities.com/en/dedicated-server/configuration
# * https://www.survivalservers.com/wiki/index.php/How_to_Create_a_StarRupture_Server_Guide
# yamllint enable rule:line-length

star_rupture___release: "{{ {} | r_pufky.data.v3(

    _date='2026-04-15',
    _debian='trixie',
    _app='CL118629',
    _app_id='3809400',
    _platform='windows',
  ) }}"

###############################################################################
# Star Rupture
###############################################################################
# Use Star Rapture developer REST API to generate password tokens for dedicated
# server.
#
# A authentication token is a password binary encrypted with developer RSA-4096
# key and base64 encoded. Consider all passwords sent compromised.
#
# The pre-generated passwords are StarRuptureAdmin, StarRupture.
#
# Reference:
# * https://starrupture-utilities.com/passwords

star_rupture___app: "{{ {} | r_pufky.data.v3(

    _root_d='/home/steam/star_rupture',
    _save_d='/home/steam/star_rupture/StarRupture/Saved/SaveGames',
    _ds_settings='/home/steam/star_rupture/DSSettings.txt',
    _admin_pass='/home/steam/star_rupture/Password.json',
    _user_pass='/home/steam/star_rupture/PlayerPassword.json',
    _auto_load_save='/home/steam/star_rupture/auto_load_save',
    _update_server='/home/steam/star_rupture/update_server',
    _bin=(
      '/home/steam/star_rupture/StarRupture/Binaries/Win64/' ~
      'StarRuptureServerEOS-Win64-Shipping.exe'
    ),
    _steamcmd=(
      '/usr/games/steamcmd ' ~
      '+@sSteamCmdForcePlatformType ' ~ star_rupture___release._platform ~
      ' +force_install_dir /home/steam/star_rupture +login anonymous '
    ),
    _url='https://starrupture-utilities.com/passwords/',
